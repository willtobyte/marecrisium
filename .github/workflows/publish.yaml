name: Publish Steam

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Conan
        run: |
          brew install conan
          conan profile detect --force
          conan config install https://github.com/willtobyte/conan-configs.git --type git

      - name: Configure tools & CMake
        run: |
          cat <<'EOF' >> ~/.conan2/profiles/default
          [replace_tool_requires]
          meson/*: meson/[*]
          pkgconf/*: pkgconf/[*]

          [tool_requires]
          !cmake/*: cmake/[>=3 <4]
          EOF

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Install dependencies
        run: conan install . --output-folder=build --build=missing --settings compiler.cppstd=23 --settings build_type=Release

      - name: Build
        run: |
          cmake -Bbuild -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --verbose

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: build/carimbo

  windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Conan
        run: |
          pip install conan
          conan profile detect --force
          conan config install https://github.com/willtobyte/conan-configs.git --type git

      - name: Configure tools & CMake
        run: |
          cat <<'EOF' >> ~/.conan2/profiles/default
          [replace_tool_requires]
          meson/*: meson/[*]
          pkgconf/*: pkgconf/[*]

          [tool_requires]
          !cmake/*: cmake/[>=3 <4]
          EOF

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Install dependencies
        run: conan install . --output-folder=build --build=missing --settings compiler.cppstd=23 --settings build_type=Release

      - name: Build
        run: |
          cmake -Bbuild -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --verbose

      - name: Collect artifact
        run: cp build/Release/carimbo.exe build/carimbo.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: build/carimbo.exe

  publish:
    runs-on: ubuntu-latest
    needs: [macos, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download macOS build
        uses: actions/download-artifact@v8
        with:
          name: macos-build
          path: macos-build

      - name: Download Windows build
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: windows-build

      - name: Create cartridge
        working-directory: cartridge
        run: zip -3 -r ../cartridge.rom .

      - name: Clone Steam SDK
        run: gh repo clone willtobyte/steamworks steamworks
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Assemble output
        run: |
          mkdir -p output/{content,macos,windows}

          cp cartridge.rom output/content/

          cp macos-build/carimbo output/macos/
          cp steamworks/redistributable_bin/osx/libsteam_api.dylib output/macos/

          cp windows-build/carimbo.exe output/windows/
          cp steamworks/redistributable_bin/win64/steam_api64.dll output/windows/

      - name: Upload to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: ${{ secrets.STEAM_APP_ID }}
          buildDescription: ${{ github.ref_name }}
          rootPath: output
          firstDepotIdOverride: 4537491
          depot1Path: content
          depot2Path: windows
          depot3Path: macos
          releaseBranch: alpha
