name: Publish Steam

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Conan
        run: |
          brew install conan
          conan profile detect --force
          conan config install https://github.com/willtobyte/conan-configs.git --type git

      - name: Configure tools & CMake
        run: |
          cat <<'EOF' >> ~/.conan2/profiles/default
          [replace_tool_requires]
          meson/*: meson/[*]
          pkgconf/*: pkgconf/[*]

          [tool_requires]
          !cmake/*: cmake/[>=3 <4]
          EOF

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Install dependencies
        run: conan install . --output-folder=build --build=missing --settings compiler.cppstd=23 --settings build_type=Release

      - name: Build
        run: |
          cmake -Bbuild \
            -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS_RELEASE="-O3 -DNDEBUG -g" \
            -DCMAKE_CXX_FLAGS_RELEASE="-O3 -DNDEBUG -g"
          cmake --build build --config Release --verbose

      - name: Generate dSYM
        run: dsymutil build/carimbo -o build/carimbo.dSYM

      - name: Strip binary
        run: strip build/carimbo

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: |
            build/carimbo
            build/carimbo.dSYM
            build/LICENSES

  windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Conan
        run: |
          pip install conan
          conan profile detect --force
          conan config install https://github.com/willtobyte/conan-configs.git --type git

      - name: Configure tools & CMake
        run: |
          cat <<'EOF' >> ~/.conan2/profiles/default
          [replace_tool_requires]
          meson/*: meson/[*]
          pkgconf/*: pkgconf/[*]

          [tool_requires]
          !cmake/*: cmake/[>=3 <4]
          EOF

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Install dependencies
        run: conan install . --output-folder=build --build=missing --settings compiler.cppstd=23 --settings build_type=Release

      - name: Build
        run: |
          cmake -Bbuild \
            -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS_RELEASE="/O2 /DNDEBUG /Zi" \
            -DCMAKE_CXX_FLAGS_RELEASE="/O2 /DNDEBUG /Zi" \
            -DCMAKE_EXE_LINKER_FLAGS_RELEASE="/DEBUG:FULL /OPT:REF /OPT:ICF"
          cmake --build build --config Release --verbose

      - name: Collect artifact
        run: |
          cp build/Release/carimbo.exe build/carimbo.exe
          cp build/Release/carimbo.pdb build/carimbo.pdb

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: |
            build/carimbo.exe
            build/carimbo.pdb
            build/LICENSES

  publish:
    runs-on: ubuntu-latest
    needs: [macos, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download macOS build
        uses: actions/download-artifact@v8
        with:
          name: macos-build
          path: macos-build

      - name: Download Windows build
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: windows-build

      - name: Create cartridge
        working-directory: cartridge
        run: zip -3 -r ../cartridge.rom .

      - name: Clone Steam SDK
        run: gh repo clone willtobyte/steamworks steamworks -- --depth 1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Assemble output
        run: |
          mkdir -p output/{content,macos,windows}

          cp cartridge.rom output/content/

          cp macos-build/carimbo output/macos/
          cp macos-build/LICENSES output/macos/
          cp steamworks/redistributable_bin/osx/libsteam_api.dylib output/macos/

          cp windows-build/carimbo.exe output/windows/
          cp windows-build/LICENSES output/windows/
          cp steamworks/redistributable_bin/win64/steam_api64.dll output/windows/

      - name: Upload to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: ${{ secrets.STEAM_APP_ID }}
          buildDescription: ${{ github.ref_name }}
          rootPath: output
          firstDepotIdOverride: 4537491
          depot1Path: content
          depot2Path: windows
          depot3Path: macos
          releaseBranch: alpha

      - name: Upload debug symbols to Sentry
        run: |
          curl -sL https://release.sentry.io/install/ | bash
          sentry-cli debug-files upload --org willtobyte --project marecrisium macos-build/carimbo.dSYM
          sentry-cli debug-files upload --org willtobyte --project marecrisium windows-build/carimbo.pdb
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Create Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: willtobyte
          SENTRY_PROJECT: marecrisium
        with:
          environment: production
          release: ${{ github.ref_name }}
