name: Windows

on:
  workflow_dispatch:
  push:
    branches:
      - "*"
    paths:
      - "src/**"
      - "tools/**"
      - "fuzz/**"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "tools/**"
      - "fuzz/**"

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Conan
        run: |
          pip install conan
          conan profile detect --force
          conan config install https://github.com/willtobyte/conan-configs.git --type git

      - name: Configure tools & CMake
        run: |
          cat <<'EOF' >> ~/.conan2/profiles/default
          [replace_tool_requires]
          meson/*: meson/[*]
          pkgconf/*: pkgconf/[*]

          [tool_requires]
          !cmake/*: cmake/[>=3 <4]
          EOF

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Install dependencies
        run: conan install . --output-folder=build --build=missing --settings compiler.cppstd=23 --settings build_type=Release

      - name: Build
        run: |
          cmake -Bbuild -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --verbose

      - name: Build tools
        working-directory: tools
        run: |
          cmake -Bbuild \
            -DCMAKE_TOOLCHAIN_FILE=../build/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Package cartridge
        run: ./tools/build/Release/pack.exe cartridge

      - name: Collect artifacts
        run: |
          mkdir -p artifact
          cp build/Release/carimbo.exe artifact/
          cp cartridge.rom artifact/
          cp tools/build/Release/pack.exe artifact/
          cp tools/build/Release/unpack.exe artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: artifact/

      - name: Build fuzzer
        working-directory: fuzz
        run: |
          cmake -Bbuild \
            -DCMAKE_TOOLCHAIN_FILE=../build/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Debug
          cmake --build build --config Debug

      - name: Generate corpus
        run: |
          pip install zstandard
          python3 fuzz/corpus.py fuzz/seed

      - name: Run corpus test
        run: ./fuzz/build/Debug/fuzzer.exe fuzz/seed
