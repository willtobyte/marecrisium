name: macOS

on:
  workflow_dispatch:
  push:
    branches:
      - "*"
    paths:
      - "src/**"
      - "tools/**"
      - "fuzz/**"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "tools/**"
      - "fuzz/**"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Conan
        run: |
          brew install conan
          conan profile detect --force

      - name: Configure tools & CMake
        run: |
          cat <<'EOF' >> ~/.conan2/profiles/default
          [replace_tool_requires]
          meson/*: meson/[*]
          pkgconf/*: pkgconf/[*]

          [tool_requires]
          !cmake/*: cmake/[>=3 <4]
          EOF

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Install dependencies
        run: conan install . --output-folder=build --build=missing --settings compiler.cppstd=23 --settings build_type=Release

      - name: Build
        run: |
          cmake -Bbuild -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --verbose

      - name: Build tools
        working-directory: tools
        run: |
          cmake -Bbuild \
            -DCMAKE_TOOLCHAIN_FILE=../build/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package cartridge
        run: ./tools/build/pack cartridge

      - name: Collect artifacts
        run: |
          mkdir -p artifact
          cp build/carimbo artifact/
          cp cartridge.rom artifact/
          cp tools/build/pack artifact/
          cp tools/build/unpack artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: artifact/

      - name: Install fuzzer dependencies
        working-directory: fuzz
        run: conan install . --output-folder=build --build=missing --settings compiler.cppstd=23 --settings build_type=Debug

      - name: Build fuzzer
        working-directory: fuzz
        run: |
          LLVM_PREFIX=$(brew --prefix llvm@18)
          cmake -Bbuild \
            -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=$LLVM_PREFIX/bin/clang \
            -DCMAKE_CXX_COMPILER=$LLVM_PREFIX/bin/clang++
          cmake --build build

      - name: Generate corpus
        run: |
          pip3 install --break-system-packages zstandard
          python3 fuzz/corpus.py fuzz/seed

      - name: Run fuzzer
        run: |
          ./fuzz/build/fuzzer fuzz/seed \
            -max_total_time=60 \
            -max_len=65536 \
            -rss_limit_mb=1024
