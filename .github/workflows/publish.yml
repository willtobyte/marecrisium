name: Publish Steam

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Setup Conan
        run: |
          uv tool install conan
          uv tool run conan profile detect --force

      - name: Configure tools & CMake
        run: |
          cat <<'EOF' >> ~/.conan2/profiles/default
          [replace_tool_requires]
          meson/*: meson/[*]
          pkgconf/*: pkgconf/[*]

          [tool_requires]
          !cmake/*: cmake/[>=4 <5]
          EOF

      - name: Restore Conan cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', 'recipes/**') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Export local recipes
        run: |
          uv tool run conan export recipes/luajit --version=2.1-20260616

      - name: Install dependencies
        run: uv tool run conan install . --output-folder=build --build=missing --settings compiler.cppstd=23 --settings build_type=Release

      - name: Build
        run: |
          cmake -Bbuild \
            -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS_RELEASE="-O2 -DNDEBUG" \
            -DCMAKE_CXX_FLAGS_RELEASE="-O2 -DNDEBUG"
          cmake --build build --config Release --verbose

      - name: Strip binary
        run: strip build/carimbo

      - name: Collect artifacts
        run: |
          mkdir -p artifact
          cp build/carimbo artifact/
          cp build/LICENSES artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: artifact/

  windows:
    runs-on: windows-latest

    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Setup Conan
        run: |
          uv tool install conan
          uv tool run conan profile detect --force

      - name: Configure tools & CMake
        run: |
          cat <<'EOF' >> ~/.conan2/profiles/default
          [replace_tool_requires]
          meson/*: meson/[*]
          pkgconf/*: pkgconf/[*]

          [tool_requires]
          !cmake/*: cmake/[>=4 <5]
          EOF

      - name: Restore Conan cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', 'recipes/**') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Export local recipes
        run: |
          uv tool run conan export recipes/luajit --version=2.1-20260616

      - name: Install dependencies
        run: uv tool run conan install . --output-folder=build --build=missing --settings compiler.cppstd=23 --settings build_type=Release --settings compiler.runtime=static

      - name: Build
        env:
          MSYS_NO_PATHCONV: 1
        run: |
          cmake -Bbuild \
            -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS_RELEASE="/O2 /DNDEBUG /MP" \
            -DCMAKE_CXX_FLAGS_RELEASE="/O2 /DNDEBUG /MP" \
            -DCMAKE_EXE_LINKER_FLAGS_RELEASE="/OPT:REF /OPT:ICF"
          cmake --build build --config Release --verbose

      - name: Collect artifacts
        run: |
          mkdir -p artifact
          cp build/Release/carimbo.exe artifact/
          cp build/LICENSES artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: artifact/

  publish:
    runs-on: ubuntu-latest
    needs: [macos, windows]

    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download macOS build
        uses: actions/download-artifact@v8
        with:
          name: macos-build
          path: macos-build

      - name: Download Windows build
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: windows-build

      - name: Clone Steam SDK
        run: gh repo clone willtobyte/steamworks steamworks -- --depth 1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Package cartridge
        run: uv run tools/pack.py cartridge

      - name: Assemble output
        run: |
          mkdir -p output/{content,macos,windows}

          cp cartridge.rom output/content/
          echo "$VERSION" > output/content/VERSION

          cp macos-build/carimbo output/macos/
          cp macos-build/LICENSES output/macos/
          cp steamworks/redistributable_bin/osx/libsteam_api.dylib output/macos/

          cp windows-build/carimbo.exe output/windows/
          cp windows-build/LICENSES output/windows/
          cp steamworks/redistributable_bin/win64/steam_api64.dll output/windows/

      - name: Upload to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: ${{ secrets.STEAM_APP_ID }}
          buildDescription: ${{ env.VERSION }}
          rootPath: output
          firstDepotIdOverride: 4537491
          depot1Path: content
          depot2Path: windows
          depot3Path: macos
          releaseBranch: alpha
